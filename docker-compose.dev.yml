version: "3.9"

# ──────────────────────────────────────────────
# NexusFlow — Development Docker Compose
# Runs only PostgreSQL (Redis is expected to be already available).
# Django runs locally on the host for fast iteration.
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up -d
#   cd backend && python manage.py runserver
#
# Redis: uses host Redis on 127.0.0.1:6379 (or the existing docker redis on 6380).
#        Update REDIS_URL in .env if needed.
# ──────────────────────────────────────────────

services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexusflow
      POSTGRES_USER: nexusflow
      POSTGRES_PASSWORD: nexusflow
    ports:
      - "5433:5432"   # 5433 to avoid conflict with any existing postgres on 5432
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusflow"]
      interval: 5s
      timeout: 3s
      retries: 10


volumes:
  postgres_dev_data:
