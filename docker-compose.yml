version: "3.9"

# ──────────────────────────────────────────────
# NexusFlow — Production Docker Compose
# For development, use: docker-compose -f docker-compose.dev.yml up
# ──────────────────────────────────────────────

services:

  # ────────────────────────────
  # PostgreSQL
  # ────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexusflow}
      POSTGRES_USER: ${POSTGRES_USER:-nexusflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusflow_net

  # ────────────────────────────
  # Redis (cache + pub/sub + broker)
  # ────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusflow_net

  # ────────────────────────────
  # Django Backend (Daphne ASGI — handles HTTP + WebSockets)
  # ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - backend_logs:/var/log/nexusflow
    networks:
      - nexusflow_net
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  # ────────────────────────────
  # Celery Worker
  # ────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: docker/celery/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/media
    networks:
      - nexusflow_net
    command: celery -A config worker --loglevel=info --concurrency=4

  # ────────────────────────────
  # Celery Beat (Scheduled Tasks)
  # ────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: docker/celery/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexusflow_net
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ────────────────────────────
  # Nginx (Reverse Proxy)
  # ────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    networks:
      - nexusflow_net


volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  backend_logs:


networks:
  nexusflow_net:
    driver: bridge
